<script>
  window.onload = function () {
    var checkSearch = setInterval(function () {
      var searchBox = document.querySelector("input.gsc-input");
      if (searchBox) {
        searchBox.focus();
        clearInterval(checkSearch);
      }
    }, 200);
  };
</script>
