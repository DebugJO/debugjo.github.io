<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/instantsearch.css@8.1.0/themes/satellite-min.css">
  <style>
    body { margin: 0; padding: 10px; background: transparent; font-family: sans-serif; }
    .ais-SearchBox-input { border-radius: 8px !important; height: 48px !important; }
    
    /* 검색 결과 스타일 */
    .search-item { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
    .search-title { font-size: 18px; color: #0056b2; font-weight: bold; text-decoration: none; display: block; margin-bottom: 5px; }
    .search-snippet { font-size: 14px; color: #444; line-height: 1.6; }
    
    /* 초기 상태에서는 결과창 숨기기 */
    #hits, #pagination { display: none; }

    @media (prefers-color-scheme: dark) {
      body { color: #eee; }
      .ais-SearchBox-input { background: #1b1b1e !important; color: #eee !important; border-color: #444 !important; }
      .search-title { color: #73a4e6 !important; }
      .search-snippet { color: #b0b0b0 !important; }
      .search-item { border-bottom-color: #333; }
    }
  </style>
</head>
<body>
  <div id="searchbox"></div>
  <div id="hits"></div>
  <div id="pagination"></div>

  <script src="https://cdn.jsdelivr.net/npm/algoliasearch@4.22.1/dist/algoliasearch-lite.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4.64.0/dist/instantsearch.production.min.js"></script>
  <script>
    const searchClient = algoliasearch('S64I9XLM7R', 'e820337511c8d6fda47bd1c5c38cca0c');
    
    const search = instantsearch({
      indexName: 'devsight',
      searchClient: searchClient,
      routing: true,
      // [핵심] 검색어가 있을 때만 검색을 수행하고 결과를 보여줌
      searchFunction(helper) {
        const hitsContainer = document.querySelector('#hits');
        const paginationContainer = document.querySelector('#pagination');
        
        if (helper.state.query === '') {
          hitsContainer.style.display = 'none';
          paginationContainer.style.display = 'none';
        } else {
          hitsContainer.style.display = 'block';
          paginationContainer.style.display = 'flex';
          helper.search();
        }
      }
    });

    search.addWidgets([
      instantsearch.widgets.searchBox({ 
        container: '#searchbox', 
        placeholder: '검색어를 입력하세요...',
        autofocus: true 
      }),
      instantsearch.widgets.hits({
        container: '#hits',
        templates: {
          empty: '<div style="padding:20px;">검색 결과가 없습니다.</div>',
          item: function(hit) {
            // 제목 추출 (hierarchy.lvl0)
            var title = hit._highlightResult && hit._highlightResult.hierarchy && hit._highlightResult.hierarchy.lvl0 
                        ? hit._highlightResult.hierarchy.lvl0.value 
                        : (hit.hierarchy && hit.hierarchy.lvl0 ? hit.hierarchy.lvl0 : '제목 없음');
            
            // 본문 요약 추출 (content)
            var snippet = hit._snippetResult && hit._snippetResult.content 
                          ? hit._snippetResult.content.value 
                          : (hit.content ? hit.content.substring(0, 200) : '');

            return '<div class="search-item">' +
                   '<a href="' + hit.url + '" target="_parent" class="search-title">' + title + '</a>' +
                   '<div class="search-snippet">' + snippet + '</div>' +
                   '</div>';
          }
        }
      }),
      instantsearch.widgets.pagination({ 
        container: '#pagination',
        scrollTo: false
      })
    ]);

    search.start();
  </script>
</body>
</html>
