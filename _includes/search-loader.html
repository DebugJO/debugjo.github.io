<!--
  Jekyll Simple Search loader
  See: <https://github.com/christian-fei/Simple-Jekyll-Search>
-->

{% capture result_elem %}
  <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
    <header>
      <h2><a href="{url}">{title}</a></h2>
      <div class="post-meta d-flex flex-column flex-sm-row text-muted mt-1 mb-1">
        {categories}
        {tags}
      </div>
    </header>
    <p>{content}</p>
  </article>
{% endcapture %}

{% capture not_found %}<p class="mt-5">{{ site.data.locales[include.lang].search.no_results }}</p>{% endcapture %}

<script>
  document.addEventListener('DOMContentLoaded', () => {

    const input = document.getElementById('search-input');
    const results = document.getElementById('search-results');

    SimpleJekyllSearch({
      searchInput: input,
      resultsContainer: results,
      json: '{{ '/assets/js/data/search.json' | relative_url }}',
      searchResultTemplate: '{{ result_elem | strip_newlines }}',
      noResultsText: '{{ not_found }}',

      searchFunction: function(searchTerm, data) {
        if (searchTerm.trim().length < 2) {
          return [];
        }

        searchTerm = searchTerm.toLowerCase();

        return data.filter(item => {
          return (
            item.title.toLowerCase().includes(searchTerm) ||
            item.content.toLowerCase().includes(searchTerm) ||
            item.categories.toLowerCase().includes(searchTerm) ||
            item.tags.toLowerCase().includes(searchTerm)
          );
        });
      },

      templateMiddleware: function(prop, value, template) {

        if (prop === 'categories') {
          return value === ''
            ? value
            : `<div class="me-sm-4"><i class="far fa-folder fa-fw"></i>${value}</div>`;
        }

        if (prop === 'tags') {
          return value === ''
            ? value
            : `<div><i class="fa fa-tag fa-fw"></i>${value}</div>`;
        }
      }
    });
  });
</script>
