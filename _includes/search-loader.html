<!--
  Jekyll Simple Search loader
  See: <https://github.com/christian-fei/Simple-Jekyll-Search>
-->

{% capture result_elem %}
  <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
    <header>
      <h2><a href="{url}">{title}</a></h2>
    </header>
    <p>{content}</p>
  </article>
{% endcapture %}

{% capture not_found %}<p class="mt-5">{{ site.data.locales[include.lang].search.no_results }}</p>{% endcapture %}

<!--
  Jekyll Simple Search loader
  See: <https://github.com/christian-fei/Simple-Jekyll-Search>
-->

<script>
// 1. 데이터를 전역에 저장 (페이지 이동해도 유지)
window.mySearchData = window.mySearchData || [];

function initSearch() {
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  if (!searchInput) return;

  // 2. 데이터가 없으면 Fetch
  if (window.mySearchData.length === 0) {
    fetch('{{ "/assets/js/data/search.json" | relative_url }}')
      .then(res => res.json())
      .then(data => { window.mySearchData = data; });
  }

  // 3. 입력 이벤트 연결
  searchInput.addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase().trim();
    if (keyword.length < 2) {
      if (searchResults) searchResults.innerHTML = '';
      return;
    }

    const keywords = keyword.split(/\s+/);
    const filtered = window.mySearchData.filter((item) => {
      const title = item.title?.toLowerCase() || '';
      const content = item.content?.toLowerCase() || '';
      return keywords.every(word => title.includes(word) || content.includes(word));
    });

    if (searchResults) {
      if (filtered.length === 0) {
        searchResults.innerHTML = `<p class="mt-5">{{ site.data.locales[include.lang].search.no_results }} <a href="/gsearch"><i class="fa-solid fa-magnifying-glass"></i> Google PSE 추가 검색</a></p>`;
      } else {
        searchResults.innerHTML = filtered.slice(0, 30).map((item) => `
          <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
            <header><h2><a href="${item.url}">${item.title}</a></h2></header>
            <p>${item.content}</p>
          </article>`).join('');
      }
    }
  });
}

// 4. 최초 실행 및 Swup 페이지 전환 시 재연결
document.addEventListener('DOMContentLoaded', initSearch);
document.addEventListener('swup:contentReplace', initSearch);
</script>
