{% capture result_elem %}
  <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
    <header>
      <h2><a href="{url}">{title}</a></h2>
    </header>
    <p>{content}</p>
  </article>
{% endcapture %}

{% capture not_found %}<p class="mt-5">{{ site.data.locales[include.lang].search.no_results }}</p>{% endcapture %}

<script>
document.addEventListener('DOMContentLoaded', () => {
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  let searchData = [];
  let blogKeywords = new Set(); // [핵심] 블로그 전체 단어를 저장할 고유 셋(Set)

  // 구글 스타일 단어 자동완성 레이어 생성
  const autocompleteList = document.createElement('ul');
  autocompleteList.id = 'search-autocomplete-dropdown';
  autocompleteList.style.cssText = `
    position: absolute;
    background: #ffffff;
    border: 1px solid #dfe1e5;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(32,33,36,0.15);
    list-style: none;
    padding: 6px 0;
    margin: 4px 0 0 0;
    max-height: 250px;
    overflow-y: auto;
    width: ${searchInput.offsetWidth || 300}px;
    z-index: 9999;
    display: none;
  `;
  searchInput.parentNode.style.position = 'relative';
  searchInput.parentNode.appendChild(autocompleteList);
  searchInput.setAttribute('autocomplete', 'off');

  /**
   * search.json preload 및 실시간 단어 사전 구축
   */
  fetch('{{ "/assets/js/data/search.json" | relative_url }}')
    .then((response) => response.json())
    .then((data) => {
      searchData = data;

      // 블로그 전체 제목과 본문에서 단어(영어, 한글, 특수문자포함 단어)를 추출하여 사전에 등록
      data.forEach(item => {
        const combinedText = `${item.title} ${item.content || ''}`.toLowerCase();
        // 공백, 문장부호 등으로 단어를 분리 (C#, 특수문자 등 개발키워드 보존을 위해 알파벳/한글/일부특수문자 기준)
        const words = combinedText.match(/[a-zA-Z0-9가-힣#\-\.]+/g);
        if (words) {
          words.forEach(word => {
            // 너무 짧거나(1글자) 의미 없는 숫자는 배제하고 단어 사전에 저장
            if (word.length > 1 && isNaN(word)) {
              blogKeywords.add(word);
            }
          });
        }
      });
    })
    .catch((err) => {
      console.error('Search load error:', err);
    });

  /**
   * 실시간 타이핑 시 '단어 추천' 처리
   */
  searchInput.addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase().trim();
    autocompleteList.innerHTML = '';

    // 2글자 미만이면 닫기
    if (keyword.length < 2) {
      autocompleteList.style.display = 'none';
      if (searchResults) searchResults.innerHTML = '';
      return;
    }

    /**
     * 내 블로그 단어 사전에서 사용자가 입력한 글자로 "시작하는" 단어 필터링
     * 예: "asy" 입력 시 -> "async", "asyncio", "asynchronous" 매칭
     */
    const matchedWords = Array.from(blogKeywords)
      .filter(word => word.startsWith(keyword))
      .slice(0, 10); // 구글처럼 상위 10개 단어만 추천

    /**
     * 단어 자동완성 드롭다운 렌더링
     */
    if (matchedWords.length > 0) {
      autocompleteList.style.width = `${searchInput.getBoundingClientRect().width}px`;
      
      matchedWords.forEach((word) => {
        const li = document.createElement('li');
        li.style.cssText = `
          padding: 8px 16px;
          cursor: pointer;
          font-size: 14px;
          color: #202124;
        `;
        
        // 입력한 부분만 굵게 표기 (구글 스타일)
        const regex = new RegExp(`^(${keyword})`, 'i');
        const highlightedWord = word.replace(regex, '<strong>$1</strong>');
        li.innerHTML = `<i class="fa-solid fa-magnifying-glass" style="margin-right: 10px; color: #9aa0a6; font-size: 11px;"></i>${highlightedWord}`;
        
        // 추천 단어를 클릭하면 검색창에 해당 단어가 입력되고, 화면 전환 검색이 즉시 실행됨
        li.addEventListener('click', () => {
          searchInput.value = word;
          autocompleteList.style.display = 'none';
          // 클릭 시 기존의 본문 정렬 검색 트리거 강제 발생
          searchInput.dispatchEvent(new Event('input'));
        });

        li.addEventListener('mouseenter', () => { li.style.background = '#f1f3f4'; });
        li.addEventListener('mouseleave', () => { li.style.background = 'transparent'; });

        autocompleteList.appendChild(li);
      });
      autocompleteList.style.display = 'block';
    } else {
      autocompleteList.style.display = 'none';
    }

    /**
     * [기존 원본 로직 유지] 엔터 치거나 화면 전환 시 본문 리스트 정렬 처리
     */
    if (searchResults) {
      const keywords = keyword.split(/\s+/);
      const filtered = searchData.filter((item) => {
        const title = (item.title || '').toLowerCase();
        const content = (item.content || '').toLowerCase();
        return keywords.every((word) => title.includes(word) || content.includes(word));
      });

      if (filtered.length === 0) {
        searchResults.innerHTML = `<p class="mt-5">{{ site.data.locales[include.lang].search.no_results }} <a href="/gsearch" style="font-size: 14px !important;"><i class="fa-solid fa-magnifying-glass" style="font-size: 12px !important;"></i>Google PSE 추가 검색</a></p>`;
        return;
      }

      const results = filtered.slice(0, 30);
      searchResults.innerHTML = results.map((item) => `
        <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
          <header><h2><a href="${item.url}">${item.title}</a></h2></header>
          <p>${item.content}</p>
        </article>
      `).join('');
    }
  });

  // 바깥 클릭 시 자동완성 닫기
  document.addEventListener('click', (e) => {
    if (e.target !== searchInput) {
      autocompleteList.style.display = 'none';
    }
  });
});
</script>
