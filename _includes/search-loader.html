<!--
  Jekyll Simple Search loader
  See: <https://github.com/christian-fei/Simple-Jekyll-Search>
-->

{% capture result_elem %}
  <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
    <header>
      <h2><a href="{url}">{title}</a></h2>
      <div class="post-meta d-flex flex-column flex-sm-row text-muted mt-1 mb-1">
        {categories}
        {tags}
      </div>
    </header>
    <p>{content}</p>
  </article>
{% endcapture %}

{% capture not_found %}<p class="mt-5">{{ site.data.locales[include.lang].search.no_results }}</p>{% endcapture %}

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('search-results');
    let searchData = [];
  
    fetch('{{ '/assets/js/data/search.json' | relative_url }}')
      .then(response => response.json())
      .then(data => {
        searchData = data;
        console.log("검색 데이터 로드 완료:", data.length);
      });
  
    searchInput.addEventListener('input', function(e) {
      const query = e.target.value.toLowerCase().trim();
      resultsContainer.innerHTML = ''; 
  
      if (query.length >= 2) {
        resultsContainer.style.display = 'block';
  
        const filtered = searchData.filter(item => {
          return (item.title && item.title.toLowerCase().includes(query)) || 
                 (item.content && item.content.toLowerCase().includes(query)) ||
                 (item.tags && item.tags.toLowerCase().includes(query));
        });
  
        if (filtered.length > 0) {
          filtered.forEach(item => {
            const div = document.createElement('div');
            div.innerHTML = `
              <div class="px-md-4 py-3">
                <a href="${item.url}">${item.title}</a>
                <div class="post-meta d-flex flex-column flex-sm-row text-muted mt-1">
                  ${item.categories ? `<div class="me-sm-4"><i class="far fa-folder fa-fw"></i>${item.categories}</div>` : ''}
                  ${item.tags ? `<div><i class="fa fa-tag fa-fw"></i>${item.tags}</div>` : ''}
                </div>
              </div>
            `;
            resultsContainer.appendChild(div);
          });
        } else {
          resultsContainer.innerHTML = '<div class="px-md-4 py-3 text-muted">{{ not_found }}</div>';
        }
      } else {
        resultsContainer.style.display = 'none';
      }
    });
  });
</script>
