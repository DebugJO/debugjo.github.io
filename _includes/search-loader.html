{% capture result_elem %}
  <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
    <header>
      <h2><a href="{url}">{title}</a></h2>
    </header>
    <p>{content}</p>
  </article>
{% endcapture %}

{% capture not_found %}<p class="mt-5">{{ site.data.locales[include.lang].search.no_results }}</p>{% endcapture %}

<script>
// 핵심: 데이터가 로드되면 무조건 전역 변수에 저장해서 다른 페이지와 공유
window.searchData = window.searchData || [];

document.addEventListener('DOMContentLoaded', () => {

  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');

  // 검색창 없는 페이지 에러 방지
  if (!searchInput) return;

  let searchData = [];

  /**
   * search.json preload
   */
  fetch('{{ "/assets/js/data/search.json" | relative_url }}')
    .then((response) => response.json())
    .then((data) => {
      searchData = data;
      window.searchData = data; // 이 부분이 핵심입니다.
    })
    .catch((err) => {
      console.error('Search load error:', err);
      if (searchResults) {
        searchResults.innerHTML = '<p class="mt-5">Search data load failed.</p>';
      }
    });

  /**
   * search
   */
  searchInput.addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase().trim();
    const keywords = keyword.split(/\s+/);

    /**
     * 2글자 제한
     */
    if (keyword.length < 2) {
      if (searchResults) searchResults.innerHTML = '';
      return;
    }

    /**
     * filter
     */
    const filtered = searchData.filter((item) => {
      const title = item.title?.toLowerCase() || '';
      const content = item.content?.toLowerCase() || '';
      
      return keywords.every((word) => {
        return (title.includes(word) || content.includes(word));
      });
    });

    /**
     * render
     */
    if (!searchResults) return;

    if (filtered.length === 0) {
      searchResults.innerHTML = `
        <p class="mt-5">
          {{ site.data.locales[include.lang].search.no_results }} 
          <a href="/gsearch" style="font-size: 14px !important;">
            <i class="fa-solid fa-magnifying-glass" style="font-size: 12px !important;"></i>Google PSE 추가 검색
          </a>
        </p>
      `;
      return;
    }

    /**
     * 최대 개수 제한
     */
    const results = filtered.slice(0, 30);

    searchResults.innerHTML = results.map((item) => {
      return `
        <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
          <header>
            <h2><a href="${item.url}">${item.title}</a></h2>
          </header>
          <p>${item.content}</p>
        </article>
      `;
    }).join('');
  });

  searchInput.focus();
});
</script>
