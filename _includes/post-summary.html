{%- assign content = post.content -%}

<div class="post-summary-content"> 
  {%- if include.full_text -%}
    {%- if content contains '<!--more-->' -%}
      {{ content | split: '<!--more-->' | first }}
    {%- else -%}
      {{ content }}
    {%- endif -%}
  {%- else -%}
    {{ content | markdownify | strip_html | truncate: 100 }}
  {%- endif -%}
</div>
