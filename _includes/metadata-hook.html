<script>
  document.querySelectorAll('.highlight table td pre')
  .forEach(pre => {

    pre.innerHTML =
      pre.innerHTML.replace(
        /\n\s*\n/g,
        '\n<span class="empty-line"></span>\n'
      );
  });
</script>
