layout: default
title: "Algolia Search"
permalink: /asearch/
nav_exclude: true
---

<div class="gsearch-top">
  <h1><i class="fa-solid fa-magnifying-glass"></i> Search</h1>
</div>

<!-- 검색창 -->
<input type="text" id="algolia-search-input" class="gsc-input" placeholder="검색어를 입력하세요..." style="width: 100%; padding: 10px; border: 1px solid #d2d2d2; border-radius: 4px;" />

<!-- 결과창 -->
<div id="algolia-search-hits" style="margin-top: 20px;"></div>

<script src="https://cdn.jsdelivr.net/npm/algoliasearch@4/dist/algoliasearch-lite.umd.js"></script>
<script>
  const client = algoliasearch('S64I9XLM7R', 'b4be7839927d23267756efbcf9397314');
  const index = client.initIndex('devsight');
  
  const input = document.getElementById('algolia-search-input');
  const hitsContainer = document.getElementById('algolia-search-hits');

  input.addEventListener('input', function() {
    const query = input.value;
    if (query.length < 2) { hitsContainer.innerHTML = ''; return; }

    index.search(query).then(({ hits }) => {
      hitsContainer.innerHTML = hits.map(hit => `
        <div class="gsc-webResult gsc-result" style="margin-bottom: 12px;">
          <a href="${hit.url}" style="color: #0056b2; font-size: 16px; font-weight: bold; text-decoration: none;">
            ${hit.lvl0 || '제목 없음'}
          </a>
          <div class="gs-snippet" style="font-size: 14px; color: #444; margin-top: 4px;">
            ${hit.content ? hit.content.substring(0, 150) + '...' : ''}
          </div>
        </div>
      `).join('');
    });
  });
</script>
