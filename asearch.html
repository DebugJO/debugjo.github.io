<!-- 1. 스타일 (구글처럼 외부에서 로드) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/instantsearch.css@8.1.0/themes/satellite-min.css">

<div class="asearch-container" style="padding: 20px;">
  <h1 id="algolia-title">Site Search</h1>
  
  <!-- 위젯이 들어갈 자리 -->
  <div id="searchbox"></div>
  <div id="hits"></div>
  <div id="pagination"></div>
</div>

<!-- 2. 알고리아 라이브러리 로드 (구글 cse.js 로드 방식과 동일) -->
<script src="https://cdn.jsdelivr.net/npm/algoliasearch@4.22.1/dist/algoliasearch-lite.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4.64.0/dist/instantsearch.production.min.js"></script>

<!-- 3. 실행부: Jekyll의 간섭을 피하기 위해 raw 사용 -->
{% raw %}
<script>
  // 즉시 실행 함수
  (function startSearch() {
    // 라이브러리가 로드되었는지 확인
    if (typeof algoliasearch === 'undefined' || typeof instantsearch === 'undefined') {
      console.log("Waiting for libraries...");
      setTimeout(startSearch, 100); // 아직 로드 안됐으면 0.1초 후 다시 시도
      return;
    }

    // 제목을 바꿔서 스크립트가 실행됨을 알림
    document.getElementById('algolia-title').innerText = "Algolia Search";

    const searchClient = algoliasearch('S64I9XLM7R', 'e820337511c8d6fda47bd1c5c38cca0c');
    const search = instantsearch({
      indexName: 'devsight',
      searchClient: searchClient,
      routing: true
    });

    search.addWidgets([
      instantsearch.widgets.searchBox({
        container: '#searchbox',
        placeholder: '검색어를 입력하세요',
      }),
      instantsearch.widgets.hits({
        container: '#hits',
        templates: {
          empty: '검색 결과가 없습니다.',
          item: (hit, { html, components }) => html`
            <div style="margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
              <a href="${hit.url}" style="font-size: 18px; color: #0056b2; font-weight: bold; text-decoration: none;">
                ${components.Highlight({ hit, attribute: 'hierarchy.lvl0' })}
              </a>
              <div style="font-size: 14px; color: #444; margin-top: 5px;">
                ${components.Snippet({ hit, attribute: 'content' })}
              </div>
            </div>
          `
        }
      }),
      instantsearch.widgets.pagination({
        container: '#pagination'
      })
    ]);

    search.start();
  })();
</script>
{% endraw %}
