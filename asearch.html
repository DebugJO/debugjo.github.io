<!-- 1. 스타일 (최소한) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/instantsearch.css@8.1.0/themes/satellite-min.css">

<div style="padding: 20px;">
  <h2>알고리아 검색 테스트</h2>
  
  <!-- 이 박스들이 화면에 보여야 합니다 -->
  <div id="searchbox" style="border: 2px solid red; padding: 10px; margin-bottom: 10px;"></div>
  <div id="hits" style="border: 2px solid blue; padding: 10px;"></div>
</div>

<!-- 2. 라이브러리 로드 (순서 중요) -->
<script src="https://cdn.jsdelivr.net/npm/algoliasearch@4.22.1/dist/algoliasearch-lite.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4.64.0/dist/instantsearch.production.min.js"></script>

<!-- 3. 스크립트 -->
<script>
  // Jekyll과의 충돌을 피하기 위해 가장 단순한 방식으로 작성
  window.onload = function() {
    try {
      const searchClient = algoliasearch('S64I9XLM7R', 'e820337511c8d6fda47bd1c5c38cca0c');
      const search = instantsearch({
        indexName: 'devsight',
        searchClient: searchClient,
      });

      search.addWidgets([
        instantsearch.widgets.searchBox({
          container: '#searchbox',
          placeholder: '여기에 입력이 가능한가요?',
        }),
        instantsearch.widgets.hits({
          container: '#hits',
          templates: {
            item: '<div>결과가 여기에 표시됩니다.</div>'
          }
        })
      ]);

      search.start();
      console.log("알고리아 시작 성공!");
    } catch (e) {
      console.error("알고리아 초기화 에러:", e);
    }
  };
</script>
