<!-- FlexSearch 라이브러리 (최신 번들) -->
<script src="https://cdn.jsdelivr.net/gh/nextapps-de/flexsearch@0.7.43/dist/flexsearch.bundle.js"></script>

<div class="px-1 px-sm-2 px-lg-4 px-xl-0 mt-5">
  <input type="text" id="my-search-input" placeholder="검색어를 입력하세요..." 
         style="width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid var(--search-border-color); background: var(--card-bg); color: var(--text-color);">
</div>

<ul id="search-autocomplete" style="position: absolute; width: calc(100% - 30px); background: var(--card-bg); border: 1px solid var(--search-border-color); border-radius: 0 0 10px 10px; z-index: 9999; list-style: none; padding: 0; margin: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: none;"></ul>

<div id="main-results" class="mt-4"></div>

<script>
window.initSearchFunctionality = function() {
  const searchInput = document.getElementById('search-input');
  if (!searchInput) return; // 페이지에 검색창이 없으면 바로 종료
  
  const searchResults = document.getElementById('search-results');
  let searchData = [];

  // 데이터 로드
  fetch('/assets/js/data/search.json')
    .then(r => r.json())
    .then(data => { searchData = data; });

  // 기존 이벤트 리스너 제거 (중복 실행 방지)
  const newSearchInput = searchInput.cloneNode(true);
  searchInput.parentNode.replaceChild(newSearchInput, searchInput);

  newSearchInput.addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase().trim();
    if (keyword.length < 2) {
      searchResults.innerHTML = '';
      return;
    }
    
    // ... 필터링 및 렌더링 로직 (기존 코드 동일) ...
    const filtered = searchData.filter(item => 
      item.title?.toLowerCase().includes(keyword) || 
      item.content?.toLowerCase().includes(keyword)
    );
    
    searchResults.innerHTML = filtered.map(item => `...`).join('');
  });
};

// 초기 실행
window.initSearchFunctionality();
</script>
