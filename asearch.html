<!-- 1. 스타일 로드 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/instantsearch.css@8.1.0/themes/satellite-min.css">

<div class="asearch-container" style="padding: 20px;">
  <h1 id="algolia-status">Site Search</h1>
  
  <!-- 상태 확인용 (스크립트가 실행되면 사라짐) -->
  <div id="js-check" style="color: red; padding: 10px; border: 1px solid red;">
    대기 중: 자바스크립트가 실행되지 않고 있습니다. (새로고침을 눌러보세요)
  </div>

  <div id="searchbox" style="margin-top: 20px; min-height: 50px;"></div>
  <div id="hits"></div>
  <div id="pagination"></div>
</div>

<!-- 2. 라이브러리 로드 -->
<script src="https://cdn.jsdelivr.net/npm/algoliasearch@4.22.1/dist/algoliasearch-lite.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4.64.0/dist/instantsearch.production.min.js"></script>

<!-- 3. 실행부 (Jekyll 문법을 완전히 배제한 순수 JS) -->
<script>
  // [체크 1] 이 코드가 읽히는 순간 즉시 실행
  (function() {
    var checkEl = document.getElementById('js-check');
    if (checkEl) {
      checkEl.style.color = "green";
      checkEl.style.borderColor = "green";
      checkEl.innerText = "확인: 자바스크립트 엔진 작동 중...";
    }

    function start() {
      // 라이브러리 로드 확인
      if (typeof algoliasearch === 'undefined' || typeof instantsearch === 'undefined') {
        setTimeout(start, 200);
        return;
      }

      try {
        const searchClient = algoliasearch('S64I9XLM7R', 'e820337511c8d6fda47bd1c5c38cca0c');
        const search = instantsearch({
          indexName: 'devsight',
          searchClient: searchClient,
          routing: true
        });

        search.addWidgets([
          instantsearch.widgets.searchBox({
            container: '#searchbox',
            placeholder: '검색어를 입력하세요',
          }),
          instantsearch.widgets.hits({
            container: '#hits',
            templates: {
              empty: '검색 결과가 없습니다.',
              item: function(hit) {
                // Jekyll 충돌 방지를 위해 템플릿 리터럴 대신 문자열 결합 사용
                return '<div style="margin-bottom:20px;">' +
                       '<a href="' + hit.url + '" style="font-size:18px; font-weight:bold; color:#0056b2; text-decoration:none;">' + 
                       (hit._highlightResult.hierarchy.lvl0.value || '제목 없음') + 
                       '</a>' +
                       '<div style="font-size:14px; color:#444; margin-top:5px;">' + 
                       (hit._snippetResult ? hit._snippetResult.content.value : '') + 
                       '</div>' +
                       '</div>';
              }
            }
          }),
          instantsearch.widgets.pagination({
            container: '#pagination'
          })
        ]);

        search.start();
        
        // 성공 시 체크박스 숨김
        if (checkEl) checkEl.style.display = "none";
        document.getElementById('algolia-status').innerText = "Algolia Search";
        
      } catch (e) {
        if (checkEl) checkEl.innerText = "실행 에러: " + e.message;
      }
    }

    start();
  })();
</script>
