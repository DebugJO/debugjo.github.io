<!-- FlexSearch 라이브러리 추가 -->
<script src="https://cdn.jsdelivr.net/npm/flexsearch@0.7.31/dist/flexsearch.bundle.min.js"></script>

<div class="gsearch-top">
  <h1><i class="fa-solid fa-magnifying-glass"></i> Search</h1>
</div>

<!-- 검색창 -->
<input type="text" id="asearch-input" placeholder="검색어를 입력하세요..." style="width: 100%; padding: 10px; border: 1px solid #d2d2d2; border-radius: 4px;" />

<!-- 자동완성 및 결과창 -->
<div id="asearch-results" style="margin-top: 20px;"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('asearch-input');
  const resultsContainer = document.getElementById('asearch-results');
  
  // FlexSearch 인덱스 초기화 (제목+내용 인덱싱, 자동완성 최적화)
  const index = new FlexSearch.Document({
    document: {
      id: "url",
      index: ["title", "content"]
    },
    tokenize: "forward", // 앞글자부터 매칭하여 자동완성 지원
    resolution: 9        // 검색 정확도/속도 밸런스
  });

  // 데이터 로드
  fetch('{{ "/assets/js/data/search.json" | relative_url }}')
    .then(response => response.json())
    .then(data => {
      // 인덱스에 데이터 추가
      data.forEach(item => index.add(item));
      window.searchData = data; // 결과 렌더링을 위해 저장
    });

  input.addEventListener('input', (e) => {
    const keyword = e.target.value.trim();
    
    if (keyword.length < 2) {
      resultsContainer.innerHTML = '';
      return;
    }

    // 자동완성 검색 실행 (limit: 10개까지 추천)
    index.search(keyword, { limit: 10 }).then(results => {
      if (results.length === 0) {
        resultsContainer.innerHTML = '<p>결과가 없습니다.</p>';
        return;
      }

      // 검색된 URL들에 해당하는 실제 데이터 매칭
      const matchedItems = results.map(url => window.searchData.find(item => item.url === url));

      resultsContainer.innerHTML = matchedItems.map(item => `
        <article style="border-bottom: 1px solid #eee; padding: 10px 0;">
          <header>
            <h2 style="font-size: 1.2rem; margin: 0;">
              <a href="${item.url}">${item.title}</a>
            </h2>
          </header>
          <p style="font-size: 0.9rem; color: #666; margin: 5px 0 0 0;">
            ${item.content.substring(0, 100)}...
          </p>
        </article>
      `).join('');
    });
  });
});
</script>
