<!-- 1. FlexSearch 라이브러리 로드 -->
<script src="https://cdn.jsdelivr.net/gh/nextapps-de/flexsearch@0.7.43/dist/flexsearch.bundle.js"></script>

<div class="px-1 px-sm-2 px-lg-4 px-xl-0 mt-5">
  <input type="text" id="my-search-input" placeholder="검색어를 입력하세요 (FlexSearch 기반)..." 
         style="width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid var(--search-border-color); background: var(--card-bg); color: var(--text-color);">
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const searchInput = document.getElementById('my-search-input');
  const searchResults = document.getElementById('search-results');
  
  // FlexSearch 인덱스 초기화
  const index = new FlexSearch.Document({
    document: {
      id: "url",
      index: ["title", "content"],
      store: ["title", "url", "content"]
    },
    tokenize: "forward"
  });

  // 1. 자동완성 메뉴 생성
  const autoMenu = document.createElement('ul');
  autoMenu.id = 'search-autocomplete';
  autoMenu.style.cssText = 'position: absolute; top: 100%; left: 0; width: 100%; background: var(--card-bg); border: 1px solid var(--search-border-color); border-radius: 0 0 10px 10px; z-index: 9999; list-style: none; padding: 0; margin: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: none;';
  searchInput.parentNode.style.position = 'relative';
  searchInput.parentNode.appendChild(autoMenu);

  // 2. 데이터 로드 및 인덱싱
  fetch('/assets/js/data/search.json')
    .then(res => res.json())
    .then(data => {
      data.forEach(item => index.add(item));
    })
    .catch(err => console.error('Data load failed:', err));

  // 3. 검색 로직 (FlexSearch 적용)
  searchInput.addEventListener('input', (e) => {
    const keyword = e.target.value.trim();
    
    // 자동완성/결과 초기화
    autoMenu.innerHTML = '';
    autoMenu.style.display = 'none';
    
    if (keyword.length < 2) {
      searchResults.innerHTML = '';
      return;
    }

    // FlexSearch 검색 수행
    const searchResultsIdx = index.search(keyword, { limit: 30, suggest: true });
    const flatResults = [...new Set(searchResultsIdx.flatMap(r => r.result))];

    // 자동완성 렌더링 (상위 8개)
    const suggestions = flatResults.slice(0, 8);
    if (suggestions.length > 0) {
      autoMenu.innerHTML = suggestions.map(id => {
        const item = index.get(id);
        return `
          <li class="suggest-item" style="padding: 10px 15px; cursor: pointer; border-bottom: 1px solid var(--main-border-color);">
            <a href="${item.url}" style="text-decoration: none; color: var(--text-color); font-size: 14px; display: block;">
              <i class="fa-solid fa-magnifying-glass me-2" style="font-size: 12px; opacity: 0.5;"></i> ${item.title}
            </a>
          </li>
        `;
      }).join('');
      autoMenu.style.display = 'block';
    }

    // 메인 결과 렌더링 (상위 30개)
    if (flatResults.length === 0) {
      searchResults.innerHTML = `<p class="mt-5">No results found. <a href="/gsearch">Google PSE 추가 검색</a></p>`;
    } else {
      searchResults.innerHTML = flatResults.slice(0, 30).map(id => {
        const item = index.get(id);
        return `
          <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
            <header><h2><a href="${item.url}">${item.title}</a></h2></header>
            <p>${item.content ? item.content.substring(0, 150) + '...' : ''}</p>
          </article>
        `;
      }).join('');
    }
  });

  // 외부 클릭 시 닫기
  document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target)) autoMenu.style.display = 'none';
  });
});
</script>

<style>
  .suggest-item:hover { background-color: var(--search-tag-bg) !important; }
  .suggest-item a:hover { color: var(--sidebar-highlight) !important; }
</style>
