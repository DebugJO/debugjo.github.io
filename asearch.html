nav_exclude: true
---

<div class="gsearch-top">
  <h1><i class="fa-solid fa-magnifying-glass"></i> Search</h1>
</div>

<!-- 유니크한 ID 사용 -->
<input type="text" id="asearch-custom-input" class="gsc-input" placeholder="검색어를 입력하세요..." style="width: 100%; padding: 10px; border: 1px solid #d2d2d2; border-radius: 4px;" />
<div id="asearch-custom-results" style="margin-top: 20px;"></div>

<script>
(function() {
  const input = document.getElementById('asearch-custom-input');
  const results = document.getElementById('asearch-custom-results');
  let data = [];

  // 1. 데이터 로드 (독립적으로 실행)
  fetch('{{ "/assets/js/data/search.json" | relative_url }}')
    .then(r => r.json())
    .then(json => { data = json; console.log("데이터 로드 성공:", data.length); })
    .catch(e => console.error("데이터 로드 실패:", e));

  // 2. 이벤트 리스너 (DOM이 준비된 후)
  input.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    if (val.length < 2) {
      results.innerHTML = '';
      return;
    }

    const filtered = data.filter(item => 
      (item.title && item.title.toLowerCase().includes(val)) || 
      (item.content && item.content.toLowerCase().includes(val))
    );

    if (filtered.length === 0) {
      results.innerHTML = '<p>검색 결과가 없습니다.</p>';
      return;
    }

    results.innerHTML = filtered.slice(0, 30).map(item => `
      <article style="margin-bottom: 20px;">
        <h2><a href="${item.url}">${item.title}</a></h2>
        <p>${item.content.substring(0, 100)}...</p>
      </article>
    `).join('');
  });
})();
</script>
