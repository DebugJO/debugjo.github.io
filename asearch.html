---
layout: default
title: "고급 검색"
permalink: /asearch/
nav_exclude: true
---

<div
  class="px-1 px-sm-2 px-lg-4 px-xl-0 mt-5"
  style="position:relative;"
>

  <input
    type="text"
    id="my-search-input"
    placeholder="검색어를 입력하세요..."
    autocomplete="off"
    style="
      width:100%;
      padding:15px;
      font-size:1.1rem;
      border-radius:8px;
      border:1px solid var(--search-border-color);
      background:var(--card-bg);
      color:var(--text-color);
    "
  >

  <ul
    id="search-autocomplete"
    style="
      position:absolute;
      top:100%;
      left:0;
      width:100%;
      background:var(--card-bg);
      border:1px solid var(--search-border-color);
      border-top:none;
      border-radius:0 0 10px 10px;
      z-index:9999;
      list-style:none;
      padding:0;
      margin:0;
      display:none;
      overflow:hidden;
    "
  ></ul>

</div>

<div id="main-results" class="mt-4"></div>

<script>

document.addEventListener('DOMContentLoaded', () => {

  const searchInput =
    document.getElementById('my-search-input');

  const searchResults =
    document.getElementById('main-results');

  const autoMenu =
    document.getElementById('search-autocomplete');

  let searchData = [];

  /**
   * search.json load
   */
  fetch('/assets/js/data/search.json')

    .then(r => r.json())

    .then(data => {

      searchData = data;

      console.log('search loaded:', searchData.length);
    })

    .catch(err => {

      console.error(err);

      searchResults.innerHTML = `
        <p>search.json load failed</p>
      `;
    });

  /**
   * excerpt
   */
  function excerpt(text, len = 180) {

    if (!text) return '';

    return text

      .replace(/<[^>]*>/g, ' ')
      .replace(/\s+/g, ' ')
      .trim()
      .substring(0, len);
  }

  /**
   * search
   */
  searchInput.addEventListener('input', (e) => {

    const keyword =
      e.target.value
        .toLowerCase()
        .trim();

    autoMenu.style.display = 'none';

    if (keyword.length < 2) {

      searchResults.innerHTML = '';

      return;
    }

    const keywords =
      keyword.split(/\s+/);

    const filtered =
      searchData.filter(item => {

        const title =
          (item.title || '').toLowerCase();

        const content =
          (item.content || '').toLowerCase();

        return keywords.every(word => {

          return (
            title.includes(word) ||
            content.includes(word)
          );
        });
      });

    /**
     * autocomplete
     */
    const suggestions =
      filtered.slice(0, 5);

    if (suggestions.length > 0) {

      autoMenu.innerHTML =
        suggestions.map(item => `

          <li
            style="
              border-bottom:1px solid var(--search-border-color);
            "
          >

            <a
              href="${item.url}"
              style="
                display:block;
                padding:10px;
                text-decoration:none;
                color:var(--text-color);
              "
            >

              <div
                style="
                  font-size:14px;
                  font-weight:600;
                  margin-bottom:4px;
                "
              >
                ${item.title}
              </div>

              <div
                style="
                  font-size:12px;
                  opacity:0.7;
                "
              >
                ${excerpt(item.content, 60)}...
              </div>

            </a>

          </li>

        `).join('');

      autoMenu.style.display = 'block';
    }

    /**
     * no results
     */
    if (filtered.length === 0) {

      searchResults.innerHTML = `
        <p class="mt-5">
          No results found.
        </p>
      `;

      return;
    }

    /**
     * render
     */
    searchResults.innerHTML =
      filtered.slice(0, 30).map(item => `

        <article class="mb-5">

          <header>

            <h2>

              <a href="${item.url}">
                ${item.title}
              </a>

            </h2>

          </header>

          <p>
            ${excerpt(item.content)}...
          </p>

        </article>

      `).join('');
  });

  /**
   * outside click
   */
  document.addEventListener('click', (e) => {

    if (
      !searchInput.contains(e.target) &&
      !autoMenu.contains(e.target)
    ) {

      autoMenu.style.display = 'none';
    }
  });

});

</script>
