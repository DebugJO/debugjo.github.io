<!-- 1. 스타일 및 라이브러리 로드 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/autocomplete.js@0.38.1/dist/autocomplete.min.css">
<script src="https://cdn.jsdelivr.net/npm/autocomplete.js@0.38.1/dist/autocomplete.min.js"></script>

<div class="px-1 px-sm-2 px-lg-4 px-xl-0 mt-5">
  <input type="text" id="my-search-input" placeholder="검색어를 입력하세요 (구글 방식)..." 
         style="width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid #ccc;">
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  
  // [추가] 자동완성 UI 레이어 생성
  const autoMenu = document.createElement('ul');
  autoMenu.id = 'search-autocomplete';
  autoMenu.style.cssText = 'position:absolute; top:100%; left:0; width:100%; background:var(--card-bg); border:1px solid var(--search-border-color); border-radius:0 0 10px 10px; z-index:9999; list-style:none; padding:0; margin:0; box-shadow:0 4px 10px rgba(0,0,0,0.2); display:none;';
  searchInput.parentNode.style.position = 'relative';
  searchInput.parentNode.appendChild(autoMenu);

  let searchData = [];
  fetch('{{ "/assets/js/data/search.json" | relative_url }}')
    .then((response) => response.json())
    .then((data) => { searchData = data; })
    .catch((err) => { console.error('Search load error:', err); });

  searchInput.addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase().trim();
    const keywords = keyword.split(/\s+/);

    // [추가] 자동완성 레이어 초기화
    autoMenu.innerHTML = '';
    autoMenu.style.display = 'none';

    if (keyword.length < 2) {
      searchResults.innerHTML = '';
      return;
    }

    const filtered = searchData.filter((item) => {
      const title = item.title?.toLowerCase() || '';
      const content = item.content?.toLowerCase() || '';
      return keywords.every((word) => title.includes(word) || content.includes(word));
    });

    // [추가] 자동완성 UI 채우기
    const suggestions = filtered.slice(0, 8);
    if (suggestions.length > 0) {
      autoMenu.innerHTML = suggestions.map(item => `
        <li style="padding:10px 15px; cursor:pointer; border-bottom:1px solid var(--search-border-color);">
          <a href="${item.url}" style="text-decoration:none; color:var(--text-color); font-size:14px;">${item.title}</a>
        </li>
      `).join('');
      autoMenu.style.display = 'block';
    }

    // --- 기존 검색 결과 렌더링 시작 (건드리지 않음) ---
    if (filtered.length === 0) {
      searchResults.innerHTML = `
        <p class="mt-5">
          {{ site.data.locales[include.lang].search.no_results }} <a href="/gsearch" style="font-size: 14px !important;"><i class="fa-solid fa-magnifying-glass" style="font-size: 12px !important;"></i>Google PSE 추가 검색</a>
        </p>
      `;
      return;
    }

    const results = filtered.slice(0, 30);
    searchResults.innerHTML = results.map((item) => `
      <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
        <header><h2><a href="${item.url}">${item.title}</a></h2></header>
        <p>${item.content}</p>
      </article>
    `).join('');
  });

  searchInput.focus();
  
  // 추천어 외 클릭 시 닫기
  document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target)) autoMenu.style.display = 'none';
  });
});
</script>
