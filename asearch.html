<!-- FlexSearch 라이브러리 (최신 번들) -->
<script src="https://cdn.jsdelivr.net/gh/nextapps-de/flexsearch@0.7.43/dist/flexsearch.bundle.js"></script>

<div class="px-1 px-sm-2 px-lg-4 px-xl-0 mt-5">
  <input type="text" id="my-search-input" placeholder="검색어를 입력하세요..." 
         style="width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid var(--search-border-color); background: var(--card-bg); color: var(--text-color);">
</div>

<ul id="search-autocomplete" style="position: absolute; width: calc(100% - 30px); background: var(--card-bg); border: 1px solid var(--search-border-color); border-radius: 0 0 10px 10px; z-index: 9999; list-style: none; padding: 0; margin: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: none;"></ul>

<div id="main-results" class="mt-4"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('my-search-input');
  const autoMenu = document.getElementById('search-autocomplete');
  const resultContainer = document.getElementById('main-results');

  // 1. FlexSearch 초기화
  const index = new FlexSearch.Document({
    document: {
      id: "url", // URL을 고유 ID로 사용
      index: ["title", "content"],
      store: ["title", "url", "content"] // 데이터 저장
    },
    tokenize: "forward"
  });

  // 2. 데이터 로드
  fetch('/assets/js/data/search.json')
    .then(res => res.json())
    .then(data => {
      data.forEach(item => index.add(item));
    });

  // 3. 검색 실행
  input.addEventListener('input', () => {
    const query = input.value.trim();
    if (query.length < 2) {
      autoMenu.style.display = 'none';
      resultContainer.innerHTML = '';
      return;
    }

    // 검색 결과 가져오기
    const results = index.search(query, { limit: 20 });
    
    // 결과 평탄화 (results는 field별로 배열을 반환하므로)
    let finalItems = [];
    results.forEach(res => {
      res.result.forEach(id => {
        const item = index.get(id);
        if (item && !finalItems.find(f => f.url === item.url)) {
          finalItems.push(item);
        }
      });
    });

    // 4. UI 렌더링
    renderSuggestions(finalItems.slice(0, 5));
    renderMainResults(finalItems);
  });

  function renderSuggestions(items) {
    if (items.length === 0) { autoMenu.style.display = 'none'; return; }
    autoMenu.innerHTML = items.map(item => `
      <li style="padding: 10px; border-bottom: 1px solid #ccc;">
        <a href="${item.url}" style="text-decoration:none; color:inherit;">${item.title}</a>
      </li>`).join('');
    autoMenu.style.display = 'block';
  }

  function renderMainResults(items) {
    resultContainer.innerHTML = items.map(item => `
      <article class="mb-4">
        <h3><a href="${item.url}">${item.title}</a></h3>
        <p>${item.content ? item.content.substring(0, 100) : ''}...</p>
      </article>`).join('');
  }
});
</script>
