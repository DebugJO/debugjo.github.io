<!-- 알고리아 InstantSearch 스타일시트 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/instantsearch.css@8.1.0/themes/satellite-min.css">

<style>
  /* 기본 레이아웃 설정 */
  .asearch-container {
    max-width: 100%;
    margin-top: 20px;
    font-family: "Pretendard Variable", "Malgun Gothic", sans-serif;
  }

  .asearch-top h1 {
    font-size: 1.25rem !important;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* 검색창 스타일 커스텀 */
  .ais-SearchBox-input {
    padding-left: 40px !important;
    border-radius: 8px !important;
    border: 1px solid #d2d2d2 !important;
    background-color: #fff !important;
    height: 45px !important;
  }

  /* 검색 결과 리스트 스타일 */
  .ais-Hits-list {
    margin-top: 20px;
  }

  .ais-Hits-item {
    padding: 15px 0 !important;
    border: none !important;
    border-bottom: 1px solid #eee !important;
    box-shadow: none !important;
    background: transparent !important;
  }

  .search-hit-title {
    font-size: 18px;
    font-weight: 600;
    color: #0056b2;
    text-decoration: none;
    display: block;
    margin-bottom: 5px;
  }

  .search-hit-title:hover {
    text-decoration: underline;
  }

  .search-hit-snippet {
    font-size: 14px;
    color: #444;
    line-height: 1.6;
    word-break: break-all;
  }

  .search-hit-url {
    font-size: 12px;
    color: #008000;
    margin-top: 4px;
  }

  /* 페이지네이션 */
  .ais-Pagination {
    margin-top: 30px;
    justify-content: center;
  }

  /****************************************************** Dark Mode *****************************************************/
  html[data-mode="dark"] {
    .asearch-top h1 { color: #e0e0e0; }
    
    .ais-SearchBox-input {
      background-color: #1b1b1e !important;
      border: 1px solid #444 !important;
      color: #b0b0b0 !important;
    }

    .ais-Hits-item {
      border-bottom: 1px solid #333 !important;
    }

    .search-hit-title {
      color: #73a4e6 !important;
    }

    .search-hit-snippet {
      color: #b0b0b0 !important;
    }

    .search-hit-url {
      color: #5c8a5c !important;
    }

    .ais-Pagination-link {
      background-color: #232323 !important;
      border-color: #444 !important;
      color: #b0b0b0 !important;
    }
    
    .ais-Pagination-item--selected .ais-Pagination-link {
      background-color: #73a4e6 !important;
      color: #fff !important;
    }
  }
</style>

<div class="asearch-container">
  <div class="asearch-top">
    <h1><i class="fa-solid fa-magnifying-glass"></i> Site Search</h1>
  </div>

  <!-- 알고리아 검색 위젯이 렌더링될 위치 -->
  <div id="searchbox"></div>
  <div id="hits"></div>
  <div id="pagination"></div>
</div>

<!-- 알고리아 라이브러리 로드 -->
<script src="https://cdn.jsdelivr.net/npm/algoliasearch@4.22.1/dist/algoliasearch-lite.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4.64.0/dist/instantsearch.production.min.js"></script>

<script>
  // 1. 알고리아 클라이언트 설정
  // 주의: Search-Only API Key를 사용하세요 (Admin Key 절대 금지)
  const searchClient = algoliasearch('S64I9XLM7R', 'e820337511c8d6fda47bd1c5c38cca0c');

  const search = instantsearch({
    indexName: 'devsight',
    searchClient,
    routing: true, // URL에 검색어 상태 유지
  });

  // 2. 검색창 위젯 추가
  search.addWidgets([
    instantsearch.widgets.searchBox({
      container: '#searchbox',
      placeholder: '검색어를 입력하세요...',
      autofocus: true,
    }),

    // 3. 검색 결과 위젯 추가
    instantsearch.widgets.hits({
      container: '#hits',
      templates: {
        empty: '<div style="padding:20px;">검색 결과가 없습니다.</div>',
        item(hit, { html, components }) {
          return html`
            <div>
              <a href="${hit.url}" class="search-hit-title">
                ${components.Highlight({ hit, attribute: 'hierarchy.lvl0' })}
              </a>
              <div class="search-hit-snippet">
                ${components.Snippet({ hit, attribute: 'content' })}
              </div>
              <div class="search-hit-url">${hit.url}</div>
            </div>
          `;
        },
      },
    }),

    // 4. 페이지네이션 위젯 추가
    instantsearch.widgets.pagination({
      container: '#pagination',
    }),
  ]);

  search.start();
</script>
