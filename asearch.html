<div class="gsearch-top">
  <h1><i class="fa-solid fa-magnifying-glass"></i> Search</h1>
</div>

<!-- ID를 기존 로더와 맞춥니다 -->
<input type="text" id="search-input" class="gsc-input" placeholder="검색어를 입력하세요..." style="width: 100%; padding: 10px;" />
<div id="search-results" style="margin-top: 20px;"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');

  input.addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase().trim();
    
    // 1. 전역에 있는 데이터를 바로 사용
    const data = window.searchData || []; 
    
    if (keyword.length < 2 || data.length === 0) {
      results.innerHTML = '';
      return;
    }

    // 2. 필터링 로직
    const filtered = data.filter(item => 
      item.title?.toLowerCase().includes(keyword) || 
      item.content?.toLowerCase().includes(keyword)
    );

    // 3. 렌더링
    results.innerHTML = filtered.slice(0, 30).map(item => `
      <article style="margin-bottom: 20px;">
        <h2><a href="${item.url}">${item.title}</a></h2>
        <p>${item.content}</p>
      </article>
    `).join('');
  });
});
</script>
