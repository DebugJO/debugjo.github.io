<!-- FlexSearch 라이브러리 (최신 번들) -->
<script src="https://cdn.jsdelivr.net/gh/nextapps-de/flexsearch@0.7.43/dist/flexsearch.bundle.js"></script>

<div class="px-1 px-sm-2 px-lg-4 px-xl-0 mt-5">
  <input type="text" id="my-search-input" placeholder="검색어를 입력하세요..." 
         style="width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid var(--search-border-color); background: var(--card-bg); color: var(--text-color);">
</div>

<ul id="search-autocomplete" style="position: absolute; width: calc(100% - 30px); background: var(--card-bg); border: 1px solid var(--search-border-color); border-radius: 0 0 10px 10px; z-index: 9999; list-style: none; padding: 0; margin: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: none;"></ul>

<div id="main-results" class="mt-4"></div>

<script>
window.initSearchFunctionality = function() {

  const searchInput = document.getElementById('my-search-input');
  if (!searchInput) return;

  const searchResults = document.getElementById('main-results');

  let autoMenu = document.getElementById('search-autocomplete');

  if (autoMenu) autoMenu.remove();

  autoMenu = document.createElement('ul');

  autoMenu.id = 'search-autocomplete';

  autoMenu.style.cssText = `
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--search-border-color);
    border-radius: 0 0 10px 10px;
    z-index: 9999;
    list-style: none;
    padding: 0;
    margin: 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    display: none;
  `;

  searchInput.parentNode.style.position = 'relative';
  searchInput.parentNode.appendChild(autoMenu);

  let searchData = [];

  fetch('/assets/js/data/search.json')
    .then(r => r.json())
    .then(data => {
      searchData = data;
    });

  const newSearchInput = searchInput.cloneNode(true);

  searchInput.parentNode.replaceChild(newSearchInput, searchInput);

  newSearchInput.addEventListener('input', (e) => {

    const keyword = e.target.value.toLowerCase().trim();

    autoMenu.innerHTML = '';
    autoMenu.style.display = 'none';

    if (keyword.length < 2) {
      searchResults.innerHTML = '';
      return;
    }

    const filtered = searchData.filter(item =>
      item.title?.toLowerCase().includes(keyword) ||
      item.content?.toLowerCase().includes(keyword)
    );

    const suggestions = filtered.slice(0, 5);

    if (suggestions.length > 0) {

      autoMenu.innerHTML = suggestions.map(item => `
        <li style="padding:10px; cursor:pointer; border-bottom:1px solid var(--search-border-color);">
          <a href="${item.url}" style="text-decoration:none; color:var(--text-color); font-size:14px;">
            ${item.title}
          </a>
        </li>
      `).join('');

      autoMenu.style.display = 'block';
    }

    if (filtered.length === 0) {

      searchResults.innerHTML = `<p class="mt-5">No results found.</p>`;

    } else {

      searchResults.innerHTML = filtered.slice(0, 30).map(item => `
        <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
          <header>
            <h2><a href="${item.url}">${item.title}</a></h2>
          </header>
          <p>${item.content}</p>
        </article>
      `).join('');
    }
  });

  document.addEventListener('click', (e) => {

    if (
      !newSearchInput.contains(e.target) &&
      !autoMenu.contains(e.target)
    ) {
      autoMenu.style.display = 'none';
    }
  });
};

window.initSearchFunctionality();
</script>
