---

<div class="gsearch-top">
  <h1><i class="fa-solid fa-magnifying-glass"></i> Search</h1>
</div>

<!-- 이 페이지 전용 ID를 부여합니다 (search-input이 아님!) -->
<input type="text" id="asearch-page-input" class="gsc-input" placeholder="검색어를 입력하세요..." style="width: 100%; padding: 10px; border: 1px solid #d2d2d2; border-radius: 4px;" />

<!-- 이 페이지 전용 결과창 ID -->
<div id="asearch-page-results" style="margin-top: 20px;"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // 이 페이지의 독립된 ID만 정확히 타겟팅합니다.
  const searchInput = document.getElementById('asearch-page-input');
  const searchResults = document.getElementById('asearch-page-results');
  let searchData = [];

  // 데이터 로드
  fetch('{{ "/assets/js/data/search.json" | relative_url }}')
    .then((response) => response.json())
    .then((data) => {
      searchData = data;
    });

  // 검색 로직
  searchInput.addEventListener('input', (e) => {
    const keyword = e.target.value.toLowerCase().trim();
    if (keyword.length < 2) {
      searchResults.innerHTML = '';
      return;
    }

    const filtered = searchData.filter((item) => {
      const title = item.title?.toLowerCase() || '';
      const content = item.content?.toLowerCase() || '';
      return title.includes(keyword) || content.includes(keyword);
    });

    if (filtered.length === 0) {
      searchResults.innerHTML = '<p>검색 결과가 없습니다.</p>';
      return;
    }

    // 결과 출력
    searchResults.innerHTML = filtered.slice(0, 30).map((item) => `
      <article class="px-1 px-sm-2 px-lg-4 px-xl-0" style="margin-bottom: 20px;">
        <header>
          <h2><a href="${item.url}">${item.title}</a></h2>
        </header>
        <p>${item.content}</p>
      </article>
    `).join('');
  });
});
</script>
