<!-- 1. 필요한 스타일과 스크립트 불러오기 (CDN) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>

<div class="gsearch-top">
  <h1><i class="fa-solid fa-magnifying-glass"></i> Search</h1>
</div>

<!-- 2. 자동완성 적용할 입력창 -->
<input type="text" id="autocomplete-input" class="gsc-input" placeholder="검색어를 입력하세요..." style="width: 100%; padding: 10px;" />

<script>
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('autocomplete-input');
  
  // 3. search.json에서 제목들을 추출하여 자동완성 목록으로 만들기
  fetch('{{ "/assets/js/data/search.json" | relative_url }}')
    .then(response => response.json())
    .then(data => {
      const titles = data.map(item => item.title);
      
      // 4. Awesomplete 자동완성 인스턴스 생성
      const awesomplete = new Awesomplete(input, {
        list: titles,
        minChars: 2 // 2글자 이상 입력 시 자동완성 활성화
      });

      // 5. 선택했을 때 해당 URL로 이동
      input.addEventListener('awesomplete-selectcomplete', (e) => {
        const selectedTitle = e.text.value;
        const target = data.find(item => item.title === selectedTitle);
        if (target) window.location.href = target.url;
      });
    });
});
</script>
