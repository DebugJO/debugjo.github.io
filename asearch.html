<!-- 1. 스타일 및 라이브러리 로드 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/autocomplete.js@0.38.1/dist/autocomplete.min.css">
<script src="https://cdn.jsdelivr.net/npm/autocomplete.js@0.38.1/dist/autocomplete.min.js"></script>

<div class="px-1 px-sm-2 px-lg-4 px-xl-0 mt-5">
  <input type="text" id="my-search-input" placeholder="검색어를 입력하세요 (구글 방식)..." 
         style="width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid #ccc;">
</div>

<script>
(function() {
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  let searchData = [];

  console.log("Search Script Initialized");

  // 1. 데이터 로드 확인
  fetch('{{ "/assets/js/data/search.json" | relative_url }}')
    .then(res => res.json())
    .then(data => {
      searchData = data;
      console.log("Data loaded, items count:", searchData.length);
    })
    .catch(err => console.error("Fetch Error:", err));

  // 2. 이벤트 감지 확인
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      console.log("Input detected:", e.target.value);
      
      if (searchData.length === 0) {
        console.warn("Search data not ready yet!");
        return;
      }

      const keyword = e.target.value.toLowerCase().trim();
      if (keyword.length < 2) {
        searchResults.innerHTML = '';
        return;
      }

      // 필터링 및 렌더링 로직
      const filtered = searchData.filter(item => 
        item.title?.toLowerCase().includes(keyword) || 
        item.content?.toLowerCase().includes(keyword)
      );

      console.log("Filtered count:", filtered.length);
      
      searchResults.innerHTML = filtered.slice(0, 10).map(item => `
        <article><h2><a href="${item.url}">${item.title}</a></h2></article>
      `).join('');
    });
  } else {
    console.error("search-input not found!");
  }
})();
</script>
