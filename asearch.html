<!-- 1. 스타일 로드 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/instantsearch.css@8.1.0/themes/satellite-min.css">

<div class="asearch-container" style="padding: 20px;">
  <h1 id="algolia-title">Site Search</h1>
  
  <!-- 위젯 박스 (테두리를 주어 영역 확인) -->
  <div id="searchbox" style="margin-bottom: 20px; min-height: 50px; border: 1px solid #ddd;"></div>
  <div id="hits" style="min-height: 100px; border: 1px solid #eee;"></div>
  <div id="pagination"></div>
</div>

<!-- 2. 라이브러리 로드 -->
<script src="https://cdn.jsdelivr.net/npm/algoliasearch@4.22.1/dist/algoliasearch-lite.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4.64.0/dist/instantsearch.production.min.js"></script>

<!-- 3. 단계별 로깅 스크립트 -->
{% raw %}
<script>
  (function() {
    console.log("Step 1: 스크립트 진입 완료");

    function initAlgolia() {
      console.log("Step 2: initAlgolia 함수 실행");

      // 라이브러리 존재 여부 체크
      if (typeof algoliasearch === 'undefined') {
        console.error("Error: algoliasearch 라이브러리가 로드되지 않았습니다.");
        return;
      }
      if (typeof instantsearch === 'undefined') {
        console.error("Error: instantsearch 라이브러리가 로드되지 않았습니다.");
        return;
      }
      console.log("Step 3: 라이브러리 로드 확인됨");

      // DOM 요소 존재 여부 체크
      const container = document.getElementById('searchbox');
      if (!container) {
        console.error("Error: #searchbox 요소를 찾을 수 없습니다. (재시도 중...)");
        return;
      }
      console.log("Step 4: DOM 요소 확인됨");

      try {
        const searchClient = algoliasearch('S64I9XLM7R', 'e820337511c8d6fda47bd1c5c38cca0c');
        const search = instantsearch({
          indexName: 'devsight',
          searchClient: searchClient,
          routing: true
        });
        console.log("Step 5: 알고리아 클라이언트 생성 완료");

        search.addWidgets([
          instantsearch.widgets.searchBox({
            container: '#searchbox',
            placeholder: '검색어를 입력하세요',
          }),
          instantsearch.widgets.hits({
            container: '#hits',
            templates: {
              empty: '검색 결과가 없습니다.',
              item: (hit, { html, components }) => html`
                <div style="margin-bottom: 15px;">
                  <a href="${hit.url}" style="font-weight:bold; color:#0056b2;">
                    ${components.Highlight({ hit, attribute: 'hierarchy.lvl0' })}
                  </a>
                </div>`
            }
          })
        ]);
        console.log("Step 6: 위젯 등록 완료");

        search.start();
        console.log("Step 7: search.start() 실행 완료 - 이제 화면에 박스가 보여야 합니다.");
        document.getElementById('algolia-title').innerText = "Algolia Search Active";

      } catch (err) {
        console.error("Step 8: 실행 중 에러 발생 ->", err);
      }
    }

    // 구글 검색처럼 타이머를 사용하여 확실하게 실행
    var checkInterval = setInterval(function() {
      if (document.getElementById('searchbox')) {
        clearInterval(checkInterval);
        initAlgolia();
      } else {
        console.log("Waiting for DOM...");
      }
    }, 500);

  })();
</script>
{% endraw %}
