name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["master"] # 브랜치명이 main이면 main으로 수정
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3' # 최신 안정화 버전
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v5 # 버전 업그레이드

      - name: Build with Jekyll
        # --trace를 붙여서 에러가 나면 정확히 어디가 틀렸는지 보여줍니다.
        run: bundle exec jekyll build --trace
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
