title: "DevSight"
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

locale: "ko-KR"

description: "Software Engineer / Developer"
url: "https://debugjo.github.io"
baseurl: ""

excerpt_separator: "<!--more-->"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

paginate: 5
paginate_path: "/page:num/"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

include: ["_posts", "_pages"]

exclude:
  - vendor/
  - .github/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/

head_scripts:
  - https://code.jquery.com/jquery-3.3.1.min.js
