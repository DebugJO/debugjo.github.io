# 테마 설정
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

# 사이트 정보
title: "DevSight"
locale: "ko-KR"
url: "https://debugjo.github.io"
baseurl: "" # 절대 빈칸!

# 빌드 설정
include: ["assets", "_pages", "_posts"]
exclude: ["vendor", ".bundle", "Gemfile", "Gemfile.lock", "node_modules"]

# Sass 설정 (중요: sass_dir 항목을 절대 넣지 마세요)
sass:
  style: compressed

# 플러그인
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap

# 기본 레이아웃 적용
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      toc: true
      toc_sticky: true

# 페이지네이션
paginate: 5
paginate_path: /page:num/
